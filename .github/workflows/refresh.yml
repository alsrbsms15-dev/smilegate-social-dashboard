name: Refresh Smilegate Social Dashboard

on:
  schedule:
    # Daily at 23:00 UTC = 08:00 KST the next morning.
    # Note: GitHub Actions cron can be delayed 5-15 min under load; that's fine.
    - cron: '0 23 * * *'
  workflow_dispatch:  # manual trigger via the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run fetch script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          META_SYSTEM_TOKEN: ${{ secrets.META_SYSTEM_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/fetch_social_stats.py

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
